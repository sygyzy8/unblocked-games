<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unblocked Games Hub</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }
        header {
            background: #1f1f1f;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }
        .container {
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }
        .add-game {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        input, button {
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            border: none;
            width: 100%;
        }
        button {
            background: #4cafef;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #379bd8;
        }
        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .game-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        iframe {
            width: 100%;
            height: 500px;
            border: none;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<header>🎮 Unblocked Games Hub</header>

<div class="container">

    <div class="add-game">
        <h3>Add Your Own Game</h3>
        <input type="text" id="gameName" placeholder="Game Name" />
        <input type="text" id="gameURL" placeholder="Game URL (example: https://example.com/game.html)" />
        <button onclick="addGame()">Add Game</button>
    </div>

    <div class="game-list" id="gameList"></div>

    <iframe id="gameFrame" style="display:none;"></iframe>

</div>

<script>
    let games = JSON.parse(localStorage.getItem("games")) || [];

    function renderGames() {
        const list = document.getElementById("gameList");
        list.innerHTML = "";

        games.forEach((game, index) => {
            const card = document.createElement("div");
            card.className = "game-card";

            card.innerHTML = `
                <h4>${game.name}</h4>
                <button onclick="playGame(${index})">Play</button>
                <button onclick="removeGame(${index})">Remove</button>
            `;

            list.appendChild(card);
        });
    }

    function addGame() {
        const name = document.getElementById("gameName").value;
        const url = document.getElementById("gameURL").value;

        if (!name || !url) {
            alert("Enter game name and URL");
            return;
        }

        games.push({ name, url });
        localStorage.setItem("games", JSON.stringify(games));

        document.getElementById("gameName").value = "";
        document.getElementById("gameURL").value = "";

        renderGames();
    }

    function playGame(index) {
        const frame = document.getElementById("gameFrame");
        frame.style.display = "block";
        frame.src = games[index].url;
        window.scrollTo(0, document.body.scrollHeight);
    }

    function removeGame(index) {
        games.splice(index, 1);
        localStorage.setItem("games", JSON.stringify(games));
        renderGames();
    }

    renderGames();
</script>

</body>
</html>
